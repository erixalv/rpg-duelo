<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPG de Duelo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.6rem;
      color: #c9a0ff;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    /* ── Arena ── */
    #arena {
      display: flex;
      gap: 32px;
      width: 100%;
      max-width: 760px;
      margin-bottom: 28px;
    }

    .card {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 12px;
      padding: 20px;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 14px;
      color: #fff;
    }

    .card.ia h2 { color: #ff7eb3; }
    .card.jogador h2 { color: #7eb3ff; }

    .stat-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
    }

    .barra-container {
      background: #2a2a3e;
      border-radius: 6px;
      height: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .barra {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    .barra-vida  { background: #4caf7d; }
    .barra-mana  { background: #5b8dee; }
    .barra-vida.baixa  { background: #e05555; }

    .stat-valor {
      font-size: 0.82rem;
      color: #aaa;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    /* ── Turno ── */
    #turno-aviso {
      font-size: 0.95rem;
      color: #c9a0ff;
      margin-bottom: 16px;
      min-height: 22px;
      text-align: center;
    }

    /* ── Ações ── */
    #acoes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
      min-height: 48px;
    }

    .btn-acao {
      background: #2a2a4a;
      border: 1px solid #4a4a80;
      color: #d0d0ff;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-acao:hover:not(:disabled) {
      background: #3a3a6a;
      transform: translateY(-1px);
    }

    .btn-acao:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Log ── */
    #log-container {
      width: 100%;
      max-width: 760px;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 12px;
      padding: 16px;
      max-height: 220px;
      overflow-y: auto;
    }

    #log-container h3 {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .log-linha {
      font-size: 0.83rem;
      color: #bbb;
      padding: 4px 0;
      border-bottom: 1px solid #22223a;
    }

    .log-linha:last-child { border-bottom: none; }

    /* ── Fim de jogo ── */
    #fim-jogo {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    #fim-jogo p {
      font-size: 1.3rem;
      color: #ffd700;
    }

    #btn-reiniciar {
      background: #3a2a6a;
      border: 1px solid #7a5abf;
      color: #d0b0ff;
      border-radius: 8px;
      padding: 10px 28px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    #btn-reiniciar:hover { background: #4a3a7a; }
  </style>
</head>
<body>

  <h1>⚔️ RPG de Duelo</h1>

  <div id="arena">
    <div class="card jogador">
      <h2 id="nome-jogador">Herói</h2>

      <p class="stat-label">Vida</p>
      <div class="barra-container">
        <div class="barra barra-vida" id="barra-vida-jogador" style="width:100%"></div>
      </div>
      <p class="stat-valor" id="texto-vida-jogador">100 / 100</p>

      <p class="stat-label">Mana</p>
      <div class="barra-container">
        <div class="barra barra-mana" id="barra-mana-jogador" style="width:100%"></div>
      </div>
      <p class="stat-valor" id="texto-mana-jogador">50 / 50</p>
    </div>

    <div class="card ia">
      <h2 id="nome-ia">Inimigo</h2>

      <p class="stat-label">Vida</p>
      <div class="barra-container">
        <div class="barra barra-vida" id="barra-vida-ia" style="width:100%"></div>
      </div>
      <p class="stat-valor" id="texto-vida-ia">100 / 100</p>

      <p class="stat-label">Mana</p>
      <div class="barra-container">
        <div class="barra barra-mana" id="barra-mana-ia" style="width:100%"></div>
      </div>
      <p class="stat-valor" id="texto-mana-ia">50 / 50</p>
    </div>
  </div>

  <p id="turno-aviso">Carregando...</p>

  <div id="acoes"></div>

  <div id="fim-jogo">
    <p id="texto-vencedor"></p>
    <button id="btn-reiniciar" onclick="reiniciar()">Jogar novamente</button>
  </div>

  <div id="log-container">
    <h3>Log do duelo</h3>
    <div id="log"></div>
  </div>

  <script>
    // ── Busca o estado atual e atualiza a UI ──
    async function carregarEstado() {
      const res = await fetch("/estado");
      const estado = await res.json();
      renderizar(estado);
    }

    // ── Envia a ação do jogador e atualiza com o novo estado ──
    async function executarAcao(acao) {
      desabilitarBotoes();
      const res = await fetch("/acao", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(acao),
      });
      const estado = await res.json();
      renderizar(estado);
    }

    // ── Reinicia a partida ──
    async function reiniciar() {
      await fetch("/reiniciar", { method: "POST" });
      document.getElementById("fim-jogo").style.display = "none";
      document.getElementById("acoes").style.display = "flex";
      await carregarEstado();
    }

    // ── Atualiza toda a UI com base no estado recebido ──
    function renderizar(estado) {
      // Personagens
      atualizarPersonagem("jogador", estado.jogador);
      atualizarPersonagem("ia", estado.ia);

      // Aviso de turno
      const aviso = document.getElementById("turno-aviso");
      if (estado.encerrado) {
        aviso.textContent = "";
      } else {
        aviso.textContent = estado.turno === "jogador"
          ? "🟢 Sua vez — escolha uma ação"
          : "⏳ Aguardando a IA...";
      }

      // Log — adiciona apenas linhas novas
      const logEl = document.getElementById("log");
      const linhasAtuais = logEl.querySelectorAll(".log-linha").length;
      estado.log.slice(linhasAtuais).forEach(linha => {
        const p = document.createElement("p");
        p.className = "log-linha";
        p.textContent = linha;
        logEl.appendChild(p);
      });
      // Rola para o fim
      const container = document.getElementById("log-container");
      container.scrollTop = container.scrollHeight;

      // Botões de ação
      renderizarAcoes(estado.acoes || []);

      // Fim de jogo
      if (estado.encerrado) {
        document.getElementById("acoes").style.display = "none";
        const fimEl = document.getElementById("fim-jogo");
        fimEl.style.display = "flex";
        document.getElementById("texto-vencedor").textContent =
          estado.vencedor === "jogador" ? "🏆 Você venceu!" : "💀 A IA venceu!";
      }
    }

    // ── Atualiza os dados de um personagem (jogador ou ia) ──
    function atualizarPersonagem(quem, dados) {
      document.getElementById(`nome-${quem}`).textContent = dados.nome;

      const pctVida = Math.max(0, Math.round((dados.vida / dados.vida_max) * 100));
      const barraVida = document.getElementById(`barra-vida-${quem}`);
      barraVida.style.width = pctVida + "%";
      // Fica vermelha quando abaixo de 30%
      barraVida.classList.toggle("baixa", pctVida < 30);
      document.getElementById(`texto-vida-${quem}`).textContent =
        `${dados.vida} / ${dados.vida_max}`;

      const pctMana = Math.max(0, Math.round((dados.mana / dados.mana_max) * 100));
      document.getElementById(`barra-mana-${quem}`).style.width = pctMana + "%";
      document.getElementById(`texto-mana-${quem}`).textContent =
        `${dados.mana} / ${dados.mana_max}`;
    }

    // ── Renderiza os botões de ação do jogador ──
    function renderizarAcoes(acoes) {
      const container = document.getElementById("acoes");
      container.innerHTML = "";

      if (acoes.length === 0) return;

      acoes.forEach(acao => {
        const btn = document.createElement("button");
        btn.className = "btn-acao";
        btn.textContent = acao.label;
        // Magia sem mana fica desabilitada
        if (acao.disponivel === false) btn.disabled = true;
        btn.onclick = () => executarAcao({ tipo: acao.tipo, id: acao.id });
        container.appendChild(btn);
      });
    }

    function desabilitarBotoes() {
      document.querySelectorAll(".btn-acao").forEach(b => b.disabled = true);
    }

    // ── Inicia ──
    window.onload = carregarEstado;
  </script>
</body>
</html>
